version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gentree}
      POSTGRES_USER: ${POSTGRES_USER:-gentree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gentree}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gentree} -d ${POSTGRES_DB:-gentree}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

